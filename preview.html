<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Happy Birthday Buzz</title>
<style>
  :root{
    --bg:#120d0a; --panel:#21160f; --gold:#e6b76a; --cream:#f4ddb4; --muted:#b88c52;
    --line:#7a4d28; --dark:#332318; --brown:#7a5635; --tan:#b88b55; --owl1:#27221d; --owl2:#9d7448;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0;background:#050403;color:var(--cream);overflow:hidden}
  body{font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", "Courier New", "PingFang SC", "Microsoft YaHei", monospace; image-rendering: pixelated;}
  .phone{height:100dvh;width:100vw;display:grid;place-items:center;padding:12px;background:radial-gradient(circle at 50% 0%,#392110 0%,#120b08 48%,#020202 100%)}
  .game{position:relative;width:min(100vw - 20px,430px);height:min(100dvh - 24px,820px);max-height:900px;background:#0b0705;border:4px solid #7a4d28;box-shadow:0 0 0 3px #160d08,0 0 0 7px #c39251,0 18px 70px #000;border-radius:4px;overflow:hidden}.game:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.025) 50%,rgba(0,0,0,.05) 50%);background-size:100% 4px;mix-blend-mode:soft-light;opacity:.6}
  .scene{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .35s steps(4,end);background:#140d09}
  .scene.active{opacity:1;pointer-events:auto}
  .art{position:absolute;left:0;top:0;width:100%;height:68%;overflow:hidden;background:#1a110b;border-bottom:4px solid #7a4d28;image-rendering:pixelated}.art:after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 70px #0009,inset 0 -18px 28px #0008}
  .caption{position:absolute;left:0;right:0;bottom:0;height:32%;background:linear-gradient(#20140d,#090604);border-top:2px solid #d09a50;padding:22px 24px 18px;display:flex;flex-direction:column;justify-content:center;gap:14px}.caption:before{content:"";position:absolute;left:16px;right:16px;top:12px;bottom:12px;border:2px solid #5b351d;box-shadow:inset 0 0 0 2px #0b0705;pointer-events:none;opacity:.8}
  .text{position:relative;z-index:1;font-size:clamp(18px,5vw,24px);line-height:1.65;letter-spacing:.04em;text-shadow:2px 2px #000,0 0 10px #7a4d2866;color:#ffe1a6;white-space:pre-line}
  .hint{position:relative;z-index:1;font-size:13px;color:#d6a35b;letter-spacing:.08em;margin-top:auto;text-align:center;animation:blink 1.1s steps(2,end) infinite}.end .hint{animation:none;opacity:.65}
  @keyframes blink{50%{opacity:.25}}
  .stars:before,.stars:after{content:"";position:absolute;inset:0;background-image:radial-gradient(#f0c676 1px,transparent 2px),radial-gradient(#b88444 1px,transparent 2px);background-size:54px 48px,87px 63px;background-position:13px 16px,35px 27px;opacity:.32;animation:twinkle 2.4s steps(2,end) infinite}.stars:after{animation-delay:1.2s}@keyframes twinkle{50%{opacity:.14}}
  .floor{position:absolute;left:-5%;right:-5%;bottom:0;height:28%;background:repeating-linear-gradient(0deg,#2c1d12 0 14px,#24170f 14px 18px);border-top:3px solid #4c311c}

  .wall:after{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(0,0,0,.12) 1px,transparent 1px),linear-gradient(rgba(0,0,0,.14) 1px,transparent 1px);background-size:32px 32px;opacity:.5}
  .window{position:absolute;left:28px;top:48px;width:86px;height:96px;background:linear-gradient(#90a67a,#e6c98d);border:5px solid #382315;box-shadow:inset 0 0 0 4px #5f3b21}.window:before{content:"";position:absolute;left:37px;top:0;width:5px;height:100%;background:#382315}.window:after{content:"";position:absolute;left:0;top:42px;width:100%;height:5px;background:#382315}
  .lamp{position:absolute;width:34px;height:34px;background:#f0b75c;border:4px solid #3b2819;clip-path:polygon(18% 0,82% 0,100% 55%,50% 100%,0 55%);box-shadow:0 0 22px #e08d36,0 0 60px #e08d3633}.lamp:before{content:"";position:absolute;left:13px;top:-38px;width:4px;height:40px;background:#20140e}.lamp.one{left:165px;top:28px}.lamp.two{left:238px;top:35px}
  .table{position:absolute;left:82px;right:82px;bottom:62px;height:42px;background:#7a4d28;border:4px solid #2b1b10;border-radius:50%;box-shadow:0 18px 0 -7px #3b2415,inset -8px -5px #3b241544,inset 6px 3px #c3925133}.table:before{content:"";position:absolute;left:46%;top:32px;width:26px;height:78px;background:#482d1a}.cup{position:absolute;width:28px;height:22px;background:#efe0bd;border:3px solid #3a2618;border-radius:0 0 8px 8px}.cup:after{content:"";position:absolute;right:-11px;top:4px;width:10px;height:9px;border:3px solid #3a2618;border-left:0;border-radius:0 8px 8px 0}.cup.a{left:136px;bottom:104px}.cup.b{right:136px;bottom:104px}.flower{position:absolute;left:50%;bottom:112px;transform:translateX(-50%);width:18px;height:28px;background:#31543a;border:2px solid #1b2418}.flower:before{content:"✦";position:absolute;left:-6px;top:-18px;color:#d79a65;font-size:18px;text-shadow:8px -2px #b74f3d,16px 3px #e4bd75}
  .bookshelf{position:absolute;right:28px;top:78px;width:82px;height:126px;background:#2b1b12;border:4px solid #56361f}.bookshelf:before{content:"";position:absolute;inset:10px;background:repeating-linear-gradient(90deg,#8a5b2e 0 8px,#25351d 8px 15px,#a06b35 15px 22px,#2b1b12 22px 30px)}
  .sign{position:absolute;left:50%;top:38px;transform:translateX(-50%);background:#27180e;border:4px solid #9d6a31;color:#e8bd70;padding:6px 16px;font-size:18px;letter-spacing:.05em;text-shadow:2px 2px #000}.sign.small{font-size:14px;top:52px}.food{position:absolute;left:75px;right:75px;bottom:82px;height:70px;background:#46291a;border:4px solid #1d110b;border-radius:50%}.food:before{content:"";position:absolute;left:38%;top:11px;width:70px;height:34px;background:#bb6c2f;border:4px solid #2b1b10;border-radius:50%;box-shadow:-60px 20px 0 -18px #d7c093,85px 16px 0 -19px #c84e32,-35px -5px 0 -22px #76a35a,120px -3px 0 -22px #d7c093}.food:after{content:"";position:absolute;left:50%;top:0;width:4px;height:46px;background:#fff2;box-shadow:12px 4px #fff2,24px 0 #fff2;animation:steam 1.2s steps(3,end) infinite}@keyframes steam{50%{transform:translateY(-6px);opacity:.4}}
  .desk{position:absolute;bottom:70px;width:38%;height:78px;background:#4b2f1c;border:4px solid #21140d}.desk.left{left:32px}.desk.right{right:32px}.laptop{position:absolute;width:70px;height:44px;background:#27313a;border:4px solid #111;bottom:122px}.laptop:after{content:"◇";position:absolute;left:26px;top:7px;color:#d1b277}.laptop.left{left:67px}.laptop.right{right:67px}.book{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:90px;height:126px;background:#0c1e36;border:5px solid #b68642;color:#d8a24c;text-align:center;padding-top:30px;font-size:24px;box-shadow:0 0 0 4px #111}.book:after{content:"A. Gide";position:absolute;bottom:18px;left:0;right:0;font-size:10px;color:#d8a24c}.poster{position:absolute;width:64px;height:48px;background:#d7c49f;border:4px solid #4a2d1a;box-shadow:0 0 0 2px #111}.poster.p1{left:37px;top:94px}.poster.p2{right:45px;top:90px}.map{position:absolute;left:0;right:0;bottom:0;height:100%;background:linear-gradient(#142036,#17351e)}.island{position:absolute;border:4px solid #3f2b18;background:#527b3c;border-radius:48%}.island.i1{left:40px;top:126px;width:132px;height:82px}.island.i2{right:36px;top:120px;width:112px;height:72px}.island.i3{left:120px;bottom:72px;width:200px;height:115px}.path{position:absolute;left:56px;right:56px;bottom:136px;border-top:5px dotted #e0b66b;transform:rotate(-8deg)}.mount{position:absolute;left:48px;top:48px;width:80px;height:80px;background:#dfe5df;clip-path:polygon(50% 0,100% 100%,0 100%);box-shadow:36px 24px 0 -8px #b8c7c2}.city{position:absolute;right:20px;bottom:0;width:170px;height:130px;background:repeating-linear-gradient(90deg,#111 0 17px,#1f2530 17px 32px);clip-path:polygon(0 50%,15% 38%,15% 20%,25% 20%,25% 45%,40% 25%,55% 50%,55% 15%,68% 15%,68% 40%,80% 30%,100% 55%,100% 100%,0 100%)}
  .bench{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);width:180px;height:30px;background:#5a371e;border:4px solid #1e120b}.bench:after{content:"";position:absolute;left:18px;right:18px;top:28px;height:40px;border-left:8px solid #2c1a0f;border-right:8px solid #2c1a0f}.skyline{position:absolute;left:0;right:0;bottom:0;height:42%;background:#080b12}.skyline:before{content:"";position:absolute;left:0;right:0;bottom:20px;height:90px;background:repeating-linear-gradient(90deg,#17202d 0 24px,#0b111b 24px 32px);clip-path:polygon(0 80%,5% 70%,8% 50%,14% 62%,18% 40%,22% 66%,30% 48%,36% 78%,45% 35%,50% 72%,58% 42%,63% 80%,70% 56%,76% 75%,84% 45%,90% 74%,100% 58%,100% 100%,0 100%)}.moon{position:absolute;right:44px;top:44px;width:42px;height:42px;background:#e6c778;border-radius:50%;box-shadow:0 0 18px #d8a04a}.moon:after{content:"";position:absolute;left:-10px;top:-3px;width:42px;height:42px;background:#142036;border-radius:50%}
  .cake{position:absolute;left:50%;bottom:110px;transform:translateX(-50%);width:92px;height:62px;background:#f3d09a;border:4px solid #3a2416;border-radius:18px 18px 8px 8px;box-shadow:inset 0 -15px #b75a43,0 0 28px #e6a04a22}.cake:before{content:"";position:absolute;left:5px;right:5px;top:14px;height:9px;background:#fff0c6;box-shadow:0 13px #fff0c6}.cake:after{content:"";position:absolute;left:50%;top:-45px;transform:translateX(-50%);width:8px;height:42px;background:#eed091;border:3px solid #3a2416}.flame{position:absolute;left:50%;bottom:213px;transform:translateX(-50%);width:16px;height:24px;background:#ffcf6a;clip-path:polygon(50% 0,100% 55%,60% 100%,20% 80%,0 45%);box-shadow:0 0 18px #ffd27a,0 0 44px #e6862e;animation:flicker .65s steps(2,end) infinite;z-index:3}.flame:after{content:"";position:absolute;left:5px;top:8px;width:6px;height:10px;background:#fff0a0;clip-path:polygon(50% 0,100% 65%,50% 100%,0 65%)}@keyframes flicker{50%{transform:translateX(-50%) scale(.9) translateY(1px)}}
  .envelope{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:250px;height:145px;background:#e8d1a8;border:5px solid #5c3820;box-shadow:0 0 0 4px #1a0e08}.envelope:before{content:"";position:absolute;inset:0;background:linear-gradient(29deg,transparent 49%,#8d6a45 50%,transparent 51%),linear-gradient(-29deg,transparent 49%,#8d6a45 50%,transparent 51%),linear-gradient(150deg,transparent 49%,#8d6a45 50%,transparent 51%),linear-gradient(-150deg,transparent 49%,#8d6a45 50%,transparent 51%)}.seal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px;background:#8c2f24;border:4px solid #4a170e;border-radius:50%;box-shadow:inset -4px -4px #5d1e17}.seal:after{content:"";position:absolute;left:11px;top:12px;width:16px;height:16px;background:#c76c55;clip-path:polygon(50% 90%,0 35%,20% 0,50% 25%,80% 0,100% 35%)}
  /* detailed pixel owls */
  .owl{position:absolute;width:82px;height:82px;filter:drop-shadow(4px 7px #0008);image-rendering:pixelated}.owl:before{content:"";position:absolute;left:12px;top:8px;width:58px;height:60px;background:var(--body);border:4px solid #17100b;border-radius:18px 18px 22px 22px;box-shadow:inset -6px -8px var(--shade), inset 5px 5px #ffffff16}.owl:after{content:"";position:absolute;left:23px;top:45px;width:36px;height:28px;background:var(--belly);border:3px solid #17100b;border-radius:50% 50% 45% 45%;box-shadow:inset -4px -4px #0001}.ear{position:absolute;top:0;width:24px;height:25px;background:var(--body);border:4px solid #17100b;clip-path:polygon(50% 0,100% 100%,0 100%)}.ear.l{left:13px;transform:rotate(-12deg)}.ear.r{right:13px;transform:rotate(12deg)}.wing{position:absolute;top:31px;width:22px;height:34px;background:var(--wing);border:3px solid #17100b;border-radius:50%;box-shadow:inset -3px -3px #0002}.wing.l{left:5px;transform:rotate(12deg)}.wing.r{right:5px;transform:rotate(-12deg)}.eye{position:absolute;top:21px;width:26px;height:26px;background:#f7ead0;border:3px solid #17100b;border-radius:50%;box-shadow:0 0 0 4px var(--glass)}.eye:before{content:"";position:absolute;left:8px;top:7px;width:10px;height:12px;background:#111;border-radius:50%;box-shadow:3px -2px #fff}.eye.l{left:15px}.eye.r{right:15px}.bridge{position:absolute;left:38px;top:32px;width:10px;height:4px;background:var(--glass);z-index:2}.beak{position:absolute;left:36px;top:42px;width:12px;height:12px;background:#d4912d;border:3px solid #17100b;clip-path:polygon(50% 100%,0 0,100% 0);z-index:2}.feet{position:absolute;left:20px;right:20px;bottom:2px;height:12px}.feet:before,.feet:after{content:"";position:absolute;width:18px;height:9px;background:#d4912d;border:3px solid #17100b;border-radius:0 0 10px 10px}.feet:before{left:0}.feet:after{right:0}.feathers{position:absolute;left:28px;top:54px;width:6px;height:6px;background:#5d432b;box-shadow:10px 3px #5d432b,20px 0 #5d432b;opacity:.7}.cheek{position:absolute;top:42px;width:8px;height:6px;background:#d79a65;border-radius:50%;opacity:.55}.cheek.l{left:20px}.cheek.r{right:20px}.shine{position:absolute;left:22px;top:15px;width:8px;height:6px;background:#fff4;border-radius:50%;box-shadow:35px 0 #fff3}.owl.black{--body:#27231e;--shade:#16130f;--belly:#b8986c;--wing:#1f1b17;--glass:#050505}.owl.gold{--body:#a57947;--shade:#6b4a2d;--belly:#e0bd7d;--wing:#8e6238;--glass:#d5b16a}.owl.small{transform:scale(.82)}.owl.medium{transform:scale(1)}.owl.large{transform:scale(1.08)}
  .owl.left{left:118px;bottom:94px}.owl.right{right:118px;bottom:94px}.owl.read1{left:76px;bottom:86px}.owl.read2{right:76px;bottom:86px}.owl.back1{left:calc(50% - 80px);bottom:112px}.owl.back2{left:calc(50% + 5px);bottom:112px}.owl.map1{left:calc(50% - 72px);bottom:50px}.owl.map2{left:calc(50% + 4px);bottom:50px}.owl.bday1{left:82px;bottom:105px}.owl.bday2{right:82px;bottom:105px}
  @media (max-height:700px){.art{height:64%}.caption{height:36%;padding:16px 20px}.text{font-size:17px}.owl{width:74px;height:74px}.owl.left{left:92px}.owl.right{right:92px}}
</style>
</head>
<body>
<div class="phone"><main class="game" id="game" aria-live="polite"></main></div>
<script>
const pages = [
 {cover:true, text:""},
 {scene:"cafe", text:"5/31，\n我们在 Agora\n第一次见面。"},
 {scene:"cafe", text:"那天下午，\n我们聊爱情，聊死亡，\n也聊存在主义。"},
 {scene:"reading", text:"之后，在线上，\n我们一起读《窄门》，\n探讨德行和情感。"},
 {scene:"korean", text:"在 Il Me Jung，\n我们聊社会，聊生活，\n也聊王阳明。"},
 {scene:"night", text:"和你在一起的时候，\n总觉得，\n还有很多话题没有聊完。"},
 {scene:"future", text:"以后，\n还想和你聊很多很多话题，\n也想一起去很多很多地方。"},
 {scene:"birthday", end:true, text:"7 / 6\n生日快乐，Buzz。\n\n希望未来还有很多故事，\n等着我们一起慢慢发现。"}
];
let idx = 0;
const game = document.getElementById('game');
function owl(cls){return `<div class="owl ${cls}"><i class="ear l"></i><i class="ear r"></i><i class="wing l"></i><i class="wing r"></i><i class="eye l"></i><i class="eye r"></i><i class="bridge"></i><i class="beak"></i><i class="cheek l"></i><i class="cheek r"></i><i class="shine"></i><i class="feathers"></i><i class="feet"></i></div>`}
function sceneArt(p){
 if(p.cover) return `<div class="art stars"><div class="floor"></div><div class="lamp one" style="left:30px;top:26px"></div><div class="envelope"><i class="seal"></i></div></div>`;
 if(p.scene==='cafe') return `<div class="art"><div class="wall"></div><div class="window"></div><div class="lamp one"></div><div class="lamp two"></div><div class="bookshelf"></div><div class="floor"></div><div class="table"></div><div class="cup a"></div><div class="cup b"></div><div class="flower"></div>${owl('black left large')}${owl('gold right large')}</div>`;
 if(p.scene==='reading') return `<div class="art stars"><div class="wall" style="background:linear-gradient(#1b2230,#0c0a12 75%)"></div><div class="window" style="background:linear-gradient(#101727,#0b0f1c);left:28px;top:40px"></div><div class="desk left"></div><div class="desk right"></div><div class="laptop left"></div><div class="laptop right"></div><div class="book">窄门</div>${owl('black read1 medium')}${owl('gold read2 medium')}</div>`;
 if(p.scene==='korean') return `<div class="art stars"><div class="wall" style="background:linear-gradient(#302014,#100b08)"></div><div class="sign">IL ME JUNG</div><div class="floor"></div><div class="food"></div><div class="cup a" style="left:110px"></div><div class="cup b" style="right:110px"></div>${owl('black left large')}${owl('gold right large')}</div>`;
 if(p.scene==='night') return `<div class="art stars" style="background:#10182a"><div class="moon"></div><div class="skyline"></div><div class="bench"></div>${owl('black back1 small')}${owl('gold back2 small')}</div>`;
 if(p.scene==='future') return `<div class="art stars"><div class="map"></div><div class="mount"></div><div class="island i1"></div><div class="island i2"></div><div class="island i3"></div><div class="path"></div><div class="city"></div>${owl('black map1 small')}${owl('gold map2 small')}</div>`;
 if(p.scene==='birthday') return `<div class="art stars" style="background:linear-gradient(#10182a,#080507)"><div class="skyline"></div><div class="floor" style="height:22%"></div><div class="cake"></div><div class="flame"></div>${owl('black bday1 large')}${owl('gold bday2 large')}</div>`;
}
function render(){
 game.innerHTML = pages.map((p,i)=>`<section class="scene ${i===idx?'active':''} ${p.end?'end':''}">${sceneArt(p)}<div class="caption"><div class="text">${p.text}</div><div class="hint">${p.end?'愿望停在这一页':'点击继续 ✦'}</div></div></section>`).join('');
}
render();
game.addEventListener('click',()=>{ if(idx < pages.length-1){ idx++; render(); }});
document.addEventListener('keydown',e=>{ if((e.key===' '||e.key==='Enter'||e.key==='ArrowRight') && idx < pages.length-1){ idx++; render(); }});
</script>
</body>
</html>
